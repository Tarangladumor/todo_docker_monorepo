# Build the docker iamge
# push the docker image to dockerhub
# ssh into your vm and start new image

name: Deploy the backend
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the code
        uses: actions/checkout@v2
      
      - name: Docker login
        uses: docker/login-action@v2
        with: 
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v4
        with: 
          context: .
          file: ./docker/Dockerfile.backend
          push: true
          tags: tarang2607/todo-app-backend:${{ github.sha }}

      - name: Deploy to VM
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" &> ~/ssh_key
          chmod 700 /home/runner/ssh_keys
          ssh -o StrictHostKeyChecking=no -i ~/ssh_key root@13.60.246.218 -t "docker stop user_backend && docker run --name user_backend -d -p 8080:8080 tarang2607/todo-app-backend:${{ github.sha }}"
